<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customer Churn Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f8f3e9;
            font-family:Arial, sans-serif;
        }

        .card{
            margin-top:60px;
            border:none;
            border-radius:18px;
            background:#fffdf8;
            box-shadow:0px 10px 25px rgba(0,0,0,0.15);
        }

        h2{
            color:#5a4632;
            font-weight:bold;
        }

        .form-label{
            font-weight:600;
            color:#5a4632;
        }

        .form-control,
        .form-select{
            border-radius:10px;
            background:#fffaf2;
        }

        .btn-custom{
            background:#8b6f47;
            color:white;
            font-weight:bold;
            border:none;
            border-radius:10px;
        }

        .btn-custom:hover{
            background:#6f5638;
            color:white;
        }

        #result{
            margin-top:25px;
        }

    </style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card">

<div class="card-body">

<h2 class="text-center">
📊 Customer Churn Prediction
</h2>

<p class="text-center text-muted mb-4">
Predict whether a customer is likely to churn.
</p>

<form id="predictionForm">

<div class="mb-3">

<label class="form-label">

Customer Tenure (Months)

</label>

<input
type="number"
class="form-control"
name="tenure"
required>

</div>

<div class="mb-3">

<label class="form-label">

Monthly Charges

</label>

<input
type="number"
step="0.01"
class="form-control"
name="monthlycharges"
required>

</div>

<div class="mb-3">

<label class="form-label">

Contract Type

</label>

<select class="form-select" name="contract">

<option value="Month-to-month">Month-to-month</option>

<option value="One year">One year</option>

<option value="Two year">Two year</option>

</select>

</div>

<div class="d-grid">

<button type="submit" class="btn btn-custom btn-lg">

Predict Customer

</button>

</div>

</form>

<div id="result"></div>

</div>

</div>

</div>

</div>

</div>

<script>

document.getElementById("predictionForm").addEventListener("submit", async function(e){

e.preventDefault();

document.getElementById("result").innerHTML=`
<div class="alert alert-warning text-center">
Predicting...
</div>`;

const data={

tenure:Number(document.getElementsByName("tenure")[0].value),

monthlycharges:Number(document.getElementsByName("monthlycharges")[0].value),

contract:document.getElementsByName("contract")[0].value

};

const response=await fetch("/predict",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(data)

});

const result=await response.json();

let color="success";

if(result["Churn Prediction"]==="Yes"){

color="danger";

}

document.getElementById("result").innerHTML=`

<div class="alert alert-${color} text-center">

<h4>Prediction Result</h4>

<h3>${result["Churn Prediction"]}</h3>

</div>

`;

});

</script>

</body>

</html>
